services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: oryx-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: oryx
      POSTGRES_PASSWORD: oryx
      POSTGRES_DB: oryx
    ports:
      # Host 55432 -> container 5432 (avoids conflict with any local Postgres on 5432/5433)
      - "55432:5432"
    volumes:
      - oryx-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oryx -d oryx"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: oryx-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      # Host 16379 -> container 6379 (avoids conflict with any local Redis on 6379)
      - "16379:6379"
    volumes:
      - oryx-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  oryx-pg-data:
  oryx-redis-data:
